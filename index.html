<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schachanalyse</title>
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
  <div id="app">
    <h1>Schachanalyse</h1>

    <div id="mode-switcher">
      <button id="mode-prev">←</button>
      <span id="mode-label">Stellungsanalyse</span>
      <button id="mode-next">→</button>
    </div>

    <div id="mode-controls">
      <div id="figur-controls" class="hidden">
        <label>
          Figur
          <select id="filter-piece">
            <option value="">Alle</option>
            <option value="P">Bauer</option>
            <option value="N">Springer</option>
            <option value="B">Läufer</option>
            <option value="R">Turm</option>
            <option value="Q">Dame</option>
            <option value="K">König</option>
          </select>
        </label>
        <label>
          Startfeld
          <div id="origin-display">
            <input id="origin-value" type="text" placeholder="—" maxlength="2">
            <button id="clear-origin">✕</button>
          </div>
        </label>
        <button class="layer-btn" id="toggle-dominance">Farbdominanz</button>
      </div>

      <div id="stellung-controls" class="hidden">
        <div class="btn-group">
          <button class="layer-btn" id="toggle-move-heatmap">Züge anzeigen</button>
          <button class="layer-btn" id="toggle-winrate">Gewinnrate</button>
        </div>
        <div class="btn-group">
          <button class="action-btn" id="undo-move">Undo</button>
          <button class="action-btn" id="reset-position">Reset</button>
        </div>
      </div>
    </div>

    <div id="tabs">
      <button class="tab active" data-tab="2d">2D</button>
      <button class="tab" data-tab="both">2D + 3D</button>
      <button class="tab" data-tab="3d">3D</button>
    </div>

    <div id="main-area">

      <div id="board-wrap">
        <div id="board-2d">
          <canvas id="chessboard"></canvas>
        </div>
        <div id="board-3d">
          <div id="scene-container"></div>
        </div>
        <canvas id="legend"></canvas>
        <div id="viz-legend"></div>
        <div id="stats-bar">
          <div id="advantage-bar">
            <div id="adv-white"></div>
            <div id="adv-draw"></div>
            <div id="adv-black"></div>
          </div>
          <div id="stats-labels">
            <span id="stats-white"></span>
            <span id="stats-total"></span>
            <span id="stats-black"></span>
          </div>
          <div id="opening-display"></div>
        </div>
        <button class="action-btn" id="best-move" style="display:none">▶ Häufigsten Zug spielen</button>
      </div>

      <div id="tooltip"></div>

      <!-- Rechte Seite: je nach Modus -->
      <div id="right-panel">
        <div id="right-controls">
          <div id="color-toggle">
            <span class="toggle-label">Schwarz</span>
            <div id="toggle-track">
              <div id="toggle-thumb" data-state="0"></div>
              <div class="tick"></div>
              <div class="tick"></div>
              <div class="tick"></div>
            </div>
            <span class="toggle-label">Weiß</span>
          </div>

          <div id="movenr-control">
            <button id="movenr-up">▲</button>
            <input id="movenr-display" type="number" placeholder="—" min="1">
            <button id="movenr-down">▼</button>
          </div>
        </div>

        <div id="captured-sidebar">
          <div class="captured-section">
            <div class="captured-label">Schwarz</div>
            <div id="captured-b" class="captured-pieces"></div>
          </div>
          <div class="captured-section">
            <div class="captured-label">Weiß</div>
            <div id="captured-w" class="captured-pieces"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="src/js/colorScale.js"></script>
  <script src="src/js/board.js"></script>
  <script src="src/js/filters.js"></script>
  <script src="src/js/heatmap.js"></script>
  <script src="src/js/tooltip.js"></script>
  <script src="src/js/position.js"></script>
  <script src="src/js/search.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
  <script src="src/js/scene.js"></script>
  <script src="src/js/pieces3d.js"></script>
  <script src="src/js/main.js"></script>
</body>
</html>
